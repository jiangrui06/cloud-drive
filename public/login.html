<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 企业云盘</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div class="icon"><i class="fas fa-cloud"></i></div>
          <h1>企业云盘</h1>
          <p>Cloud Drive Management System</p>
        </div>

        <!-- 登录切换标签 -->
        <div class="login-tabs" id="loginTabs">
          <div class="login-tab active" data-tab="password">密码登录</div>
          <div class="login-tab" data-tab="email">邮箱登录</div>
          <div class="login-tab" data-tab="register">注册</div>
        </div>

        <!-- 密码登录 -->
        <form id="passwordForm" class="login-form">
          <div class="form-group">
            <label><i class="fas fa-user me-1"></i>用户名 / 邮箱 / 手机号</label>
            <input type="text" class="form-control" id="loginAccount" placeholder="请输入账号" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock me-1"></i>密码</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
            <i class="fas fa-sign-in-alt me-1"></i>登录
          </button>
          <div class="text-center mt-2">
            <a href="#" onclick="showForgotPassword(event)" style="font-size:13px;">忘记密码？</a>
          </div>
          <div class="text-center mt-2">
            <small class="text-muted">默认管理员: admin / admin123456</small>
          </div>
        </form>

        <!-- 邮箱登录 -->
        <form id="emailForm" class="login-form" style="display:none;">
          <div class="form-group">
            <label><i class="fas fa-envelope me-1"></i>邮箱</label>
            <input type="email" class="form-control" id="emailAccount" placeholder="请输入邮箱" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-key me-1"></i>验证码</label>
            <div class="input-group">
              <input type="text" class="form-control" id="emailCode" placeholder="请输入验证码" maxlength="6">
              <button class="btn btn-outline" type="button" id="sendCodeBtn">获取验证码</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <i class="fas fa-sign-in-alt me-1"></i>登录
          </button>
        </form>

        <!-- 注册 -->
        <form id="registerForm" class="login-form" style="display:none;">
          <div class="form-group">
            <label><i class="fas fa-user me-1"></i>用户名</label>
            <input type="text" class="form-control" id="regUsername" placeholder="3-50个字符" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope me-1"></i>邮箱（选填）</label>
            <input type="email" class="form-control" id="regEmail" placeholder="用于找回密码">
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone me-1"></i>手机号（选填）</label>
            <input type="text" class="form-control" id="regPhone" placeholder="手机号">
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock me-1"></i>密码</label>
            <input type="password" class="form-control" id="regPassword" placeholder="至少6位密码" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-check me-1"></i>确认密码</label>
            <input type="password" class="form-control" id="regConfirm" placeholder="再次输入密码" required>
          </div>
          <button type="submit" class="btn btn-success btn-block btn-lg">
            <i class="fas fa-user-plus me-1"></i>注册
          </button>
        </form>

        <!-- 忘记密码 -->
        <form id="forgotForm" class="login-form" style="display:none;">
          <div class="form-group">
            <label><i class="fas fa-envelope me-1"></i>注册邮箱</label>
            <input type="email" class="form-control" id="forgotEmail" placeholder="请输入注册时使用的邮箱" required>
          </div>
          <p style="font-size:13px;color:#666;text-align:center;">重置链接将发送至您的邮箱，请在服务器控制台查看</p>
          <div id="forgotResult" style="display:none;" class="alert alert-success"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgotBtn">
            <i class="fas fa-paper-plane me-1"></i>发送重置链接
          </button>
          <div class="text-center mt-3">
            <a href="#" onclick="showLoginTab(event)" style="font-size:13px;"><i class="fas fa-arrow-left me-1"></i>返回登录</a>
          </div>
        </form>
      </div>
      <p class="text-center mt-3 text-white opacity-75" style="font-size:13px;">
        企业网盘管理系统 v1.0.0
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // 标签切换
    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.login-form').forEach(f => f.style.display = 'none');
        document.getElementById(tab.dataset.tab + 'Form').style.display = 'block';
      });
    });

    function showForgotPassword(e) {
      e.preventDefault();
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.login-form').forEach(f => f.style.display = 'none');
      document.getElementById('forgotForm').style.display = 'block';
      document.getElementById('forgotResult').style.display = 'none';
    }

    function showLoginTab(e) {
      e.preventDefault();
      document.querySelector('[data-tab="password"]').click();
    }

    // 密码登录
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>登录中...';
      const result = await API.login(
        document.getElementById('loginAccount').value,
        document.getElementById('loginPassword').value
      );
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt me-1"></i>登录';
      if (result.code === 200) {
        Auth.setLogin(result.data);
        Toast.success('登录成功');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 300);
      } else {
        Toast.error(result.message || '登录失败');
      }
    });

    // 邮箱登录
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const result = await API.post('/auth/login/email', {
        email: document.getElementById('emailAccount').value,
        code: document.getElementById('emailCode').value
      });
      if (result.code === 200) {
        Auth.setLogin(result.data);
        Toast.success('登录成功');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 300);
      } else {
        Toast.error(result.message || '登录失败');
      }
    });

    // 发送验证码
    let countdown = 0;
    document.getElementById('sendCodeBtn').addEventListener('click', async function () {
      if (countdown > 0) return;
      const email = document.getElementById('emailAccount').value;
      if (!email) return Toast.warning('请先输入邮箱');
      const result = await API.post('/auth/send-code', { email });
      if (result.code === 200) {
        countdown = 60;
        this.textContent = '60s';
        this.disabled = true;
        const timer = setInterval(() => {
          countdown--;
          this.textContent = countdown + 's';
          if (countdown <= 0) {
            clearInterval(timer);
            this.textContent = '获取验证码';
            this.disabled = false;
          }
        }, 1000);
        Toast.success('验证码已发送（请在服务器控制台查看）');
      }
    });

    // 注册
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      if (password !== confirm) return Toast.warning('两次密码输入不一致');
      const result = await API.register({
        username: document.getElementById('regUsername').value,
        password,
        email: document.getElementById('regEmail').value || undefined,
        phone: document.getElementById('regPhone').value || undefined
      });
      if (result.code === 201) {
        Auth.setLogin(result.data);
        Toast.success('注册成功');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 300);
      } else {
        Toast.error(result.message || '注册失败');
      }
    });

    // 忘记密码
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value;
      if (!email) return Toast.warning('请输入邮箱地址');
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>发送中...';
      const result = await API.post('/auth/forgot-password', { email });
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane me-1"></i>发送重置链接';
      document.getElementById('forgotResult').textContent = result.message || '请求已发送';
      document.getElementById('forgotResult').style.display = 'block';
    });

    // 检测 URL hash，自动切换到对应标签
    if (window.location.hash === '#register') {
      const regTab = document.querySelector('[data-tab="register"]');
      if (regTab) regTab.click();
    }

    // 检测已登录
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }
  </script>
</body>
</html>
