<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - 企业云盘</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-cloud me-2"></i>企业云盘</h2>
        <p>Cloud Drive Management</p>
      </div>
      <nav class="sidebar-menu">
        <div class="menu-item active" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i>工作台</div>
        <div class="menu-item" onclick="location.href='/file-manager.html'"><i class="fas fa-folder"></i>我的文件</div>
        <div class="menu-item menu-sub" onclick="location.href='/file-manager.html?type=recent'"><i class="fas fa-clock"></i>最近文件</div>
        <div class="menu-item menu-sub" onclick="location.href='/file-manager.html?type=shared'"><i class="fas fa-share-alt"></i>共享文件</div>
        <div class="menu-item" id="menuGroups" onclick="location.href='/admin/groups.html'"><i class="fas fa-users"></i>我的群组</div>
        <div class="menu-divider" style="border-top:1px solid rgba(255,255,255,.1); margin:8px 16px;"></div>
        <div class="menu-item" id="menuUsers" onclick="location.href='/admin/users.html'" style="display:none;">
          <i class="fas fa-user-cog"></i>用户管理<span class="badge">Admin</span>
        </div>
        <div class="menu-item" onclick="location.href='/storage-stats.html'"><i class="fas fa-database"></i>存储统计</div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" onclick="showUserMenu()">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-detail">
            <div class="user-name" id="userName">加载中...</div>
            <div class="user-role" id="userRole">-</div>
          </div>
          <i class="fas fa-ellipsis-v" style="color:rgba(255,255,255,.45)"></i>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h3><i class="fas fa-home me-2"></i>工作台</h3>
        <div class="page-header-actions">
          <button class="btn btn-outline btn-sm" onclick="location.href='/file-manager.html'">
            <i class="fas fa-folder-open me-1"></i>我的文件
          </button>
          <button class="btn btn-outline btn-sm" onclick="Auth.logout()">
            <i class="fas fa-sign-out-alt me-1"></i>退出
          </button>
        </div>
      </div>

      <div class="page-body">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#1890ff,#096dd9);">
              <i class="fas fa-database"></i>
            </div>
            <div class="stat-info">
              <h4 id="statStorage">-</h4>
              <p>存储空间</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#52c41a,#389e0d);">
              <i class="fas fa-file"></i>
            </div>
            <div class="stat-info">
              <h4 id="statFiles">-</h4>
              <p>文件总数</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#faad14,#d48806);">
              <i class="fas fa-folder"></i>
            </div>
            <div class="stat-info">
              <h4 id="statFolders">-</h4>
              <p>文件夹</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#722ed1,#531dab);">
              <i class="fas fa-users"></i>
            </div>
            <div class="stat-info">
              <h4 id="statGroups">-</h4>
              <p>我的群组</p>
            </div>
          </div>
        </div>

        <!-- Storage Usage -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="fw-bold"><i class="fas fa-chart-pie me-2"></i>存储使用</span>
              <span id="storageText" style="font-size:13px;color:#666;">- / -</span>
            </div>
            <div class="progress" style="height:12px;">
              <div class="progress-bar" id="storageBar" role="progressbar" style="width:0%"></div>
            </div>
          </div>
        </div>

        <!-- Recent Files -->
        <div class="card">
          <div class="card-header">
            <span><i class="fas fa-clock me-2"></i>最近文件</span>
            <a href="/file-manager.html" class="btn btn-sm btn-outline">查看全部</a>
          </div>
          <div class="card-body p-0">
            <table class="file-table" id="recentTable">
              <thead>
                <tr>
                  <th style="width:50%">文件名</th>
                  <th style="width:20%">大小</th>
                  <th style="width:20%">更新时间</th>
                  <th style="width:10%">操作</th>
                </tr>
              </thead>
              <tbody id="recentBody">
                <tr><td colspan="4" class="text-center text-muted py-4">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fas fa-bars"></i>
  </button>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (!Auth.check()) { /* redirect handled in auth.js */ }

    const user = Auth.getUser();
    if (user) {
      document.getElementById('userName').textContent = user.nickname || user.username;
      document.getElementById('userAvatar').textContent = (user.nickname || user.username)[0].toUpperCase();
      document.getElementById('userRole').textContent = user.role === 'admin' ? '管理员' : '普通用户';
      if (user.role === 'admin') {
        document.getElementById('menuUsers').style.display = 'flex';
      }
    }

    // Load dashboard data
    async function loadDashboard() {
      // Stats
      const stats = await API.getStorageStats();
      if (stats.code === 200) {
        const d = stats.data;
        document.getElementById('statStorage').textContent = formatSize(d.total_storage);
        document.getElementById('statFiles').textContent = d.total_files;
      }

      // Folder count
      const foldersRes = await API.getFolders();
      if (foldersRes.code === 200) {
        document.getElementById('statFolders').textContent = foldersRes.data.list.length;
      }

      // Group count
      const groupsRes = await API.getGroups({ page: 1, pageSize: 1 });
      if (groupsRes.code === 200) {
        document.getElementById('statGroups').textContent = groupsRes.data.pagination?.total || groupsRes.data.list.length;
      }

      // Storage bar
      if (stats.code === 200) {
        const d = stats.data;
        const used = formatSize(d.used_storage);
        const total = formatSize(d.total_storage);
        document.getElementById('storageText').textContent = `${used} / ${total}`;
        document.getElementById('storageBar').style.width = Math.min(d.used_percent, 100) + '%';
        if (d.used_percent > 80) {
          document.getElementById('storageBar').className = 'progress-bar danger';
        } else if (d.used_percent > 60) {
          document.getElementById('storageBar').className = 'progress-bar warning';
        }
      }

      // Recent files
      const recent = await API.getRecentFiles(15);
      if (recent.code === 200 && recent.data.list.length > 0) {
        const tbody = document.getElementById('recentBody');
        tbody.innerHTML = recent.data.list.map(f => {
          const ext = (f.extension || '').replace('.', '');
          const icon = getFileIcon(ext);
          const iconClass = ['jpg','jpeg','png','gif'].includes(ext) ? 'image' :
                           ['mp4','avi','mov'].includes(ext) ? 'video' : '';
          return `<tr>
            <td>
              <div class="file-name-cell" onclick="API.downloadFile(${f.id})">
                <span class="file-icon ${iconClass}"><i class="fas ${icon}"></i></span>
                <span class="name">${escapeHtml(f.name)}</span>
              </div>
            </td>
            <td>${formatSize(f.size)}</td>
            <td>${formatDate(f.updated_at)}</td>
            <td>
              <div class="file-actions">
                <button class="btn-icon" title="下载" onclick="event.stopPropagation();API.downloadFile(${f.id})">
                  <i class="fas fa-download"></i>
                </button>
              </div>
            </td>
          </tr>`;
        }).join('');
      } else {
        document.getElementById('recentBody').innerHTML =
          '<tr><td colspan="4" class="text-center text-muted py-4">暂无文件</td></tr>';
      }
    }

    loadDashboard();

    function showUserMenu() {
      if (confirm('确定要退出登录吗？')) {
        Auth.logout();
      }
    }
  </script>
</body>
</html>
