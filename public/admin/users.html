<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 企业云盘</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-cloud me-2"></i>企业云盘</h2>
        <p>Cloud Drive Management</p>
      </div>
      <nav class="sidebar-menu">
        <div class="menu-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i>工作台</div>
        <div class="menu-item" onclick="location.href='/file-manager.html'"><i class="fas fa-folder"></i>我的文件</div>
        <div class="menu-item" onclick="location.href='/admin/groups.html'"><i class="fas fa-users"></i>我的群组</div>
        <div class="menu-divider" style="border-top:1px solid rgba(255,255,255,.1); margin:8px 16px;"></div>
        <div class="menu-divider" style="border-top:1px solid rgba(255,255,255,.1); margin:8px 16px;"></div>
        <div class="menu-item" onclick="location.href='/storage-stats.html'"><i class="fas fa-database"></i>存储统计</div>
        <div class="menu-item active" onclick="location.href='/admin/users.html'"><i class="fas fa-user-cog"></i>用户管理</div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" onclick="showUserMenu()">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-detail">
            <div class="user-name" id="userName">加载中...</div>
            <div class="user-role" id="userRole">管理员</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h3><i class="fas fa-user-cog me-2"></i>用户管理</h3>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" onclick="showCreateUserModal()">
            <i class="fas fa-user-plus me-1"></i>新建用户
          </button>
        </div>
      </div>

      <div class="page-body">
        <!-- Filters -->
        <div class="file-toolbar">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchUser" placeholder="搜索用户..." onkeyup="if(event.key==='Enter')loadUsers()">
          </div>
          <select class="form-control" id="roleFilter" style="width:auto;height:36px;" onchange="loadUsers()">
            <option value="">全部角色</option>
            <option value="admin">管理员</option>
            <option value="user">普通用户</option>
          </select>
          <select class="form-control" id="statusFilter" style="width:auto;height:36px;" onchange="loadUsers()">
            <option value="">全部状态</option>
            <option value="1">启用</option>
            <option value="0">禁用</option>
          </select>
        </div>

        <!-- User Table -->
        <div class="card">
          <div class="card-body p-0">
            <table class="data-table" id="userTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>用户名</th>
                  <th>昵称</th>
                  <th>邮箱</th>
                  <th>手机号</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>存储用量</th>
                  <th>最后登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="userBody">
                <tr><td colspan="10" class="text-center text-muted py-4">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display:none;"></div>
      </div>
    </main>
  </div>

  <!-- Create User Modal -->
  <div class="modal-overlay" id="createUserModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h4><i class="fas fa-user-plus me-2"></i>新建用户</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('createUserModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>用户名 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="newUsername" placeholder="3-50个字符">
        </div>
        <div class="form-group">
          <label>密码 <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="newPassword" placeholder="至少6位">
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" class="form-control" id="newNickname" placeholder="显示名称">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" class="form-control" id="newEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input type="text" class="form-control" id="newPhone" placeholder="手机号">
        </div>
        <div class="form-group">
          <label>角色</label>
          <select class="form-control" id="newRole">
            <option value="user">普通用户</option>
            <option value="admin">管理员</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('createUserModal')">取消</button>
        <button class="btn btn-primary" onclick="createUser()">创建</button>
      </div>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="editUserModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h4><i class="fas fa-edit me-2"></i>编辑用户</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('editUserModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" class="form-control" id="editNickname">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" class="form-control" id="editEmail">
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input type="text" class="form-control" id="editPhone">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('editUserModal')">取消</button>
        <button class="btn btn-primary" onclick="saveUserEdit()">保存</button>
      </div>
    </div>
  </div>

  <!-- Storage Quota Modal -->
  <div class="modal-overlay" id="storageQuotaModal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h4><i class="fas fa-database me-2"></i>修改存储配额</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('storageQuotaModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p id="storageQuotaUser" class="text-muted"></p>
        <div class="form-group">
          <label>存储配额 (GB)</label>
          <input type="number" class="form-control" id="storageQuotaGb" min="1" step="1" value="10">
        </div>
        <p style="font-size:13px;color:#999;margin-top:8px;">当前配额: <span id="storageQuotaCurrent"></span></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('storageQuotaModal')">取消</button>
        <button class="btn btn-primary" onclick="saveStorageQuota()">保存</button>
      </div>
    </div>
  </div>

  <!-- Operation Logs Modal -->
  <div class="modal-overlay" id="logModal">
    <div class="modal" style="max-width:700px;">
      <div class="modal-header">
        <h4><i class="fas fa-history me-2"></i>操作日志</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('logModal')">&times;</button>
      </div>
      <div class="modal-body" id="logBody">
        <div class="text-center py-4 text-muted">加载中...</div>
      </div>
    </div>
  </div>

  <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fas fa-bars"></i>
  </button>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (!Auth.requireAdmin()) {}

    const user = Auth.getUser();
    if (user) {
      document.getElementById('userName').textContent = user.nickname || user.username;
      document.getElementById('userAvatar').textContent = (user.nickname || user.username)[0].toUpperCase();
    }

    let currentPage = 1;

    async function loadUsers() {
      const params = {
        page: currentPage,
        pageSize: 20,
        keyword: document.getElementById('searchUser').value,
        role: document.getElementById('roleFilter').value,
        status: document.getElementById('statusFilter').value
      };

      const result = await API.getUsers(params);
      if (result.code !== 200) return;

      const { list, pagination } = result.data;
      const tbody = document.getElementById('userBody');

      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">暂无用户</td></tr>';
        return;
      }

      tbody.innerHTML = list.map(u => `
        <tr>
          <td>${u.id}</td>
          <td><strong>${u.username}</strong></td>
          <td>${u.nickname || '-'}</td>
          <td>${u.email || '-'}</td>
          <td>${u.phone || '-'}</td>
          <td><span class="tag ${u.role === 'admin' ? 'tag-admin' : 'tag-user'}">${u.role === 'admin' ? '管理员' : '用户'}</span></td>
          <td><span class="tag ${u.status === 1 ? 'tag-active' : 'tag-disabled'}">${u.status === 1 ? '启用' : '禁用'}</span></td>
          <td>${formatSize(u.used_storage)} / ${formatSize(u.total_storage)}</td>
          <td>${formatDate(u.last_login)}</td>
          <td>
            <div class="file-actions">
              <button class="btn-icon" title="操作日志" onclick="showUserLogs(${u.id})">
                <i class="fas fa-history"></i>
              </button>
              <button class="btn-icon" title="编辑" onclick="editUser(${u.id}, '${u.nickname || ''}', '${u.email || ''}', '${u.phone || ''}')">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn-icon" title="存储配额" onclick="showStorageQuotaModal(${u.id}, '${u.username}', ${u.total_storage})">
                <i class="fas fa-database"></i>
              </button>
              <button class="btn-icon" title="${u.status === 1 ? '禁用' : '启用'}" onclick="toggleUserStatus(${u.id}, ${u.status})">
                <i class="fas ${u.status === 1 ? 'fa-ban' : 'fa-check'}"></i>
              </button>
              ${u.role !== 'admin' ? `
              <button class="btn-icon" title="设为管理员" onclick="setRole(${u.id}, 'admin')">
                <i class="fas fa-shield-alt"></i>
              </button>` : `
              <button class="btn-icon" title="设为普通用户" onclick="setRole(${u.id}, 'user')">
                <i class="fas fa-user"></i>
              </button>`}
              ${u.role !== 'admin' ? `
              <button class="btn-icon" title="删除" onclick="deleteUser(${u.id})" style="color:var(--danger);">
                <i class="fas fa-trash-alt"></i>
              </button>` : ''}
            </div>
          </td>
        </tr>
      `).join('');

      // Pagination
      const pg = document.getElementById('pagination');
      if (pagination.totalPages > 1) {
        pg.style.display = 'flex';
        let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>&lt;</button>`;
        for (let i = 1; i <= pagination.totalPages; i++) {
          if (i === currentPage || i === 1 || i === pagination.totalPages || Math.abs(i - currentPage) <= 2) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
          }
        }
        html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= pagination.totalPages ? 'disabled' : ''}>&gt;</button>`;
        pg.innerHTML = html;
      } else {
        pg.style.display = 'none';
      }
    }

    function goPage(p) {
      if (p < 1) return;
      currentPage = p;
      loadUsers();
    }

    function showCreateUserModal() {
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newNickname').value = '';
      document.getElementById('newEmail').value = '';
      document.getElementById('newPhone').value = '';
      document.getElementById('createUserModal').classList.add('show');
    }

    async function createUser() {
      const data = {
        username: document.getElementById('newUsername').value,
        password: document.getElementById('newPassword').value,
        nickname: document.getElementById('newNickname').value || undefined,
        email: document.getElementById('newEmail').value || undefined,
        phone: document.getElementById('newPhone').value || undefined,
        role: document.getElementById('newRole').value
      };

      if (!data.username || !data.password) return alert('用户名和密码不能为空');
      const result = await API.createUser(data);
      if (result.code === 201) {
        closeModal('createUserModal');
        loadUsers();
      } else {
        alert(result.message || '创建失败');
      }
    }

    let editUserId = null;
    function editUser(id, nickname, email, phone) {
      editUserId = id;
      document.getElementById('editNickname').value = nickname;
      document.getElementById('editEmail').value = email;
      document.getElementById('editPhone').value = phone;
      document.getElementById('editUserModal').classList.add('show');
    }

    async function saveUserEdit() {
      if (!editUserId) return;
      const result = await API.updateUser(editUserId, {
        nickname: document.getElementById('editNickname').value,
        email: document.getElementById('editEmail').value || undefined,
        phone: document.getElementById('editPhone').value || undefined
      });
      if (result.code === 200) {
        closeModal('editUserModal');
        loadUsers();
      } else {
        alert(result.message || '更新失败');
      }
    }

    async function toggleUserStatus(id, currentStatus) {
      const action = currentStatus === 1 ? '禁用' : '启用';
      if (!confirm(`确定要${action}该用户吗？`)) return;
      const result = await API.adminUpdateUser(id, { status: currentStatus === 1 ? 0 : 1 });
      if (result.code === 200) loadUsers();
      else alert(result.message || '操作失败');
    }

    async function setRole(id, role) {
      const label = role === 'admin' ? '管理员' : '普通用户';
      if (!confirm(`确定要设为${label}吗？`)) return;
      const result = await API.adminUpdateUser(id, { role });
      if (result.code === 200) loadUsers();
      else alert(result.message || '操作失败');
    }

    // ==================== Delete User ====================
    async function deleteUser(id) {
      if (!confirm('确定要删除此用户吗？此操作不可恢复！')) return;
      const result = await API.deleteUser(id);
      if (result.code === 200) {
        Toast.success('用户已删除');
        loadUsers();
      } else {
        Toast.error(result.message || '删除失败');
      }
    }

    // ==================== Operation Logs ====================
    async function showUserLogs(userId) {
      document.getElementById('logBody').innerHTML = '<div class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>加载中...</div>';
      document.getElementById('logModal').classList.add('show');

      const result = await API.getLogs({ user_id: userId, pageSize: 50 });
      if (result.code !== 200) {
        document.getElementById('logBody').innerHTML = '<div class="text-center py-4 text-danger">加载失败</div>';
        return;
      }

      const logs = result.data.list || [];
      if (logs.length === 0) {
        document.getElementById('logBody').innerHTML = '<div class="text-center py-4 text-muted"><i class="fas fa-inbox me-2"></i>暂无操作日志</div>';
        return;
      }

      let html = `<p style="font-size:13px;color:#666;margin-bottom:12px;">共 ${result.data.total || logs.length} 条记录</p>`;
      html += '<div class="table-responsive" style="max-height:400px;overflow-y:auto;"><table class="data-table"><thead><tr><th>时间</th><th>用户</th><th>操作</th><th>目标</th><th>IP</th></tr></thead><tbody>';

      logs.forEach(log => {
        const actionMap = {
          'login': '登录', 'register': '注册', 'logout': '退出',
          'upload': '上传', 'delete': '删除', 'download': '下载', 'rename': '重命名', 'move': '移动', 'copy': '复制', 'edit': '编辑',
          'share': '分享', 'cancel_share': '取消分享', 'share_folder': '分享文件夹',
          'delete_folder': '删除文件夹', 'batch_delete': '批量删除', 'rollback': '回滚'
        };
        html += `<tr>
          <td style="font-size:12px;white-space:nowrap;">${formatDate(log.created_at)}</td>
          <td>${escapeHtml(log.username || '-')}</td>
          <td><span class="tag tag-active" style="font-size:11px;">${actionMap[log.action] || log.action}</span></td>
          <td style="font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(log.target_name || log.target_type || '-')}</td>
          <td style="font-size:12px;color:#999;">${log.ip_address || '-'}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      document.getElementById('logBody').innerHTML = html;
    }

    let storageQuotaTargetId = null;

    function showStorageQuotaModal(id, username, currentBytes) {
      storageQuotaTargetId = id;
      document.getElementById('storageQuotaUser').textContent = '用户: ' + username;
      document.getElementById('storageQuotaCurrent').textContent = formatSize(currentBytes);
      document.getElementById('storageQuotaGb').value = Math.round(currentBytes / (1024*1024*1024)) || 102400;
      document.getElementById('storageQuotaModal').classList.add('show');
    }

    async function saveStorageQuota() {
      if (!storageQuotaTargetId) return;
      const gb = parseFloat(document.getElementById('storageQuotaGb').value);
      if (!gb || gb < 1) return alert('配额必须大于0');
      const bytes = Math.round(gb * 1024 * 1024 * 1024);
      const result = await API.adminUpdateUser(storageQuotaTargetId, { total_storage: bytes });
      if (result.code === 200) {
        closeModal('storageQuotaModal');
        loadUsers();
      } else {
        alert(result.message || '修改失败');
      }
    }

    function formatSize(bytes) {
      bytes = Number(bytes);
      if (!bytes || bytes <= 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      const k = 1024;
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + units[i];
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    function showUserMenu() {
      if (confirm('确定要退出登录吗？')) Auth.logout();
    }

    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target === el) el.classList.remove('show');
      });
    });

    loadUsers();
  </script>
</body>
</html>
