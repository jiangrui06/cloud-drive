<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>存储统计 - 企业云盘</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .stat-overview-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-overview-card .icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #fff;
      flex-shrink: 0;
    }
    .stat-overview-card .info h3 { font-size: 26px; font-weight: 700; margin-bottom: 2px; }
    .stat-overview-card .info p { font-size: 13px; color: var(--text-muted); margin: 0; }
    .storage-progress-section { background: #fff; border-radius: 12px; padding: 28px; border: 1px solid var(--border); margin-bottom: 24px; }
    .storage-progress-section .progress { height: 16px; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .group-stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .group-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid var(--border); transition: box-shadow .2s; }
    .group-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .group-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .group-card-header h5 { font-size: 14px; font-weight: 600; margin: 0; }
    .group-card-header span { font-size: 12px; color: var(--text-muted); }
    .folder-stat { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
    .folder-stat:last-child { border-bottom: none; }
    .color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .empty-state-section { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state-section i { font-size: 40px; margin-bottom: 12px; opacity: .5; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-cloud me-2"></i>企业云盘</h2>
        <p>Cloud Drive Management</p>
      </div>
      <nav class="sidebar-menu">
        <div class="menu-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i>工作台</div>
        <div class="menu-item" onclick="location.href='/file-manager.html'"><i class="fas fa-folder"></i>我的文件</div>
        <div class="menu-item menu-sub" onclick="location.href='/file-manager.html?type=recent'"><i class="fas fa-clock"></i>最近文件</div>
        <div class="menu-item menu-sub" onclick="location.href='/file-manager.html?type=shared'"><i class="fas fa-share-alt"></i>共享文件</div>
        <div class="menu-item" onclick="location.href='/admin/groups.html'"><i class="fas fa-users"></i>我的群组</div>
        <div class="menu-divider" style="border-top:1px solid rgba(255,255,255,.1); margin:8px 16px;"></div>
        <div class="menu-item active" onclick="location.href='/storage-stats.html'"><i class="fas fa-database"></i>存储统计</div>
        <div class="menu-item" id="menuUsers" onclick="location.href='/admin/users.html'" style="display:none;">
          <i class="fas fa-user-cog"></i>用户管理<span class="badge">Admin</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" onclick="showUserMenu()">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-detail">
            <div class="user-name" id="userName">加载中...</div>
            <div class="user-role" id="userRole">-</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h3><i class="fas fa-database me-2"></i>存储统计</h3>
        <div class="page-header-actions">
          <button class="btn btn-outline btn-sm" onclick="location.reload()">
            <i class="fas fa-sync me-1"></i>刷新
          </button>
          <button class="btn btn-outline btn-sm" onclick="Auth.logout()">
            <i class="fas fa-sign-out-alt me-1"></i>退出
          </button>
        </div>
      </div>

      <div class="page-body">
        <!-- Overview Cards -->
        <div class="stats-grid" id="overviewGrid">
          <div class="stat-overview-card">
            <div class="icon" style="background:linear-gradient(135deg,#1890ff,#096dd9);"><i class="fas fa-server"></i></div>
            <div class="info">
              <h3 id="statTotalStorage">-</h3>
              <p>总存储空间</p>
            </div>
          </div>
          <div class="stat-overview-card">
            <div class="icon" style="background:linear-gradient(135deg,#52c41a,#389e0d);"><i class="fas fa-hdd"></i></div>
            <div class="info">
              <h3 id="statUsedStorage">-</h3>
              <p>已用空间</p>
            </div>
          </div>
          <div class="stat-overview-card">
            <div class="icon" style="background:linear-gradient(135deg,#faad14,#d48806);"><i class="fas fa-file"></i></div>
            <div class="info">
              <h3 id="statTotalFiles">-</h3>
              <p>文件总数</p>
            </div>
          </div>
          <div class="stat-overview-card">
            <div class="icon" style="background:linear-gradient(135deg,#722ed1,#531dab);"><i class="fas fa-users"></i></div>
            <div class="info">
              <h3 id="statGroupCount">-</h3>
              <p>我的群组</p>
            </div>
          </div>
        </div>

        <!-- Storage Usage Progress -->
        <div class="storage-progress-section">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="section-title" style="margin-bottom:0;"><i class="fas fa-chart-pie" style="color:var(--primary);"></i>存储使用</span>
            <span id="storageText" style="font-size:14px;color:#666;font-weight:500;">- / -</span>
          </div>
          <div class="progress">
            <div class="progress-bar" id="storageBar" role="progressbar" style="width:0%;"></div>
          </div>
          <div class="d-flex justify-content-between mt-2" style="font-size:12px;color:var(--text-muted);">
            <span id="storagePercent">0% 已使用</span>
            <span id="storageFree">剩余: -</span>
          </div>
        </div>

        <!-- File Type Distribution -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="section-title"><i class="fas fa-chart-bar" style="color:var(--primary);"></i>文件类型分布</div>
            <div id="typeStats"><div class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>加载中...</div></div>
          </div>
        </div>

        <!-- Group Storage Distribution -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="section-title"><i class="fas fa-folder-open" style="color:var(--warning);"></i>群组存储分布</div>
            <div id="groupStats"><div class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>加载中...</div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fas fa-bars"></i>
  </button>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (!Auth.check()) {}

    const user = Auth.getUser();
    if (user) {
      document.getElementById('userName').textContent = user.nickname || user.username;
      document.getElementById('userAvatar').textContent = (user.nickname || user.username)[0].toUpperCase();
      document.getElementById('userRole').textContent = user.role === 'admin' ? '管理员' : '普通用户';
      if (user.role === 'admin') {
        document.getElementById('menuUsers').style.display = 'flex';
      }
    }

    const colors = ['#1890ff','#52c41a','#faad14','#ff4d4f','#722ed1','#eb2f96','#fa8c16','#2f54eb','#13c2c2','#a0d911'];

    async function loadStats() {
      // Personal stats
      const stats = await API.getStorageStats();
      if (stats.code === 200) {
        const d = stats.data;
        const used = formatSize(d.used_storage);
        const total = formatSize(d.total_storage);
        const free = formatSize(d.total_storage - d.used_storage);

        document.getElementById('statTotalStorage').textContent = total;
        document.getElementById('statUsedStorage').textContent = used;
        document.getElementById('statTotalFiles').textContent = d.total_files;

        document.getElementById('storageText').textContent = `${used} / ${total}`;
        document.getElementById('storageBar').style.width = Math.min(d.used_percent, 100) + '%';
        document.getElementById('storagePercent').textContent = `${d.used_percent}% 已使用`;
        document.getElementById('storageFree').textContent = `剩余: ${free}`;

        if (d.used_percent > 80) {
          document.getElementById('storageBar').className = 'progress-bar danger';
        } else if (d.used_percent > 60) {
          document.getElementById('storageBar').className = 'progress-bar warning';
        }

        // Type distribution
        let typeHtml = '';
        if (d.type_stats && d.type_stats.length > 0) {
          typeHtml += '<div class="table-responsive"><table class="data-table"><thead><tr><th>文件类型</th><th>数量</th><th>大小</th><th>占比</th></tr></thead><tbody>';
          d.type_stats.forEach((t, i) => {
            const pct = d.used_storage > 0 ? ((t.total_size / d.used_storage) * 100).toFixed(1) : 0;
            const color = colors[i % colors.length];
            typeHtml += `<tr>
              <td><span class="color-dot" style="background:${color};"></span>.${t.extension || '未知'}</td>
              <td>${t.count}</td>
              <td>${formatSize(t.total_size)}</td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="progress" style="width:100px;height:8px;margin:0;">
                    <div class="progress-bar" style="width:${pct}%;background:${color};"></div>
                  </div>
                  <span style="font-size:12px;color:#999;">${pct}%</span>
                </div>
              </td>
            </tr>`;
          });
          typeHtml += '</tbody></table></div>';
        } else {
          typeHtml = '<div class="empty-state-section"><i class="fas fa-inbox"></i><p>暂无文件数据</p></div>';
        }
        document.getElementById('typeStats').innerHTML = typeHtml;
      }

      // Group stats
      const groupsResult = await API.getGroups({ page: 1, pageSize: 100 });
      if (groupsResult.code !== 200) {
        document.getElementById('groupStats').innerHTML = '<div class="text-center py-4 text-danger">加载失败</div>';
        return;
      }

      const groups = groupsResult.data.list;
      document.getElementById('statGroupCount').textContent = groups.length;

      if (groups.length === 0) {
        document.getElementById('groupStats').innerHTML = '<div class="empty-state-section"><i class="fas fa-users"></i><p>暂无群组</p></div>';
        return;
      }

      let groupHtml = '<div class="group-stats-grid">';
      let groupIndex = 0;
      for (const g of groups) {
        const gStats = await API.getGroupStorageStats(g.id);
        if (gStats.code === 200) {
          const gd = gStats.data;
          const gUsed = formatSize(gd.used_storage);
          groupHtml += `
            <div class="group-card">
              <div class="group-card-header">
                <h5><i class="fas fa-folder-open" style="color:${colors[groupIndex % colors.length]};"></i> ${escapeHtml(g.name)}</h5>
                <span>${gd.total_files} 个文件 · ${gUsed}</span>
              </div>`;
          if (gd.folder_stats && gd.folder_stats.length > 0) {
            groupHtml += '<div style="margin-top:4px;">';
            gd.folder_stats.forEach(fs => {
              const pct = gd.used_storage > 0 ? ((fs.total_size / gd.used_storage) * 100).toFixed(1) : 0;
              groupHtml += `<div class="folder-stat">
                <span><i class="fas fa-folder me-1" style="color:#ffc107;"></i>${escapeHtml(fs.name)}</span>
                <span style="color:#666;">${fs.file_count} 文件 · ${formatSize(fs.total_size)} <span style="color:#999;">(${pct}%)</span></span>
              </div>`;
            });
            groupHtml += '</div>';
          } else {
            groupHtml += '<p style="font-size:13px;color:#999;margin:0;text-align:center;padding:16px 0;">暂无可用的文件夹统计</p>';
          }
          groupHtml += '</div>';
          groupIndex++;
        }
      }
      groupHtml += '</div>';
      document.getElementById('groupStats').innerHTML = groupHtml;
    }

    loadStats();

    function showUserMenu() {
      if (confirm('确定要退出登录吗？')) Auth.logout();
    }
  </script>
</body>
</html>
