<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - 企业云盘</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div class="icon"><i class="fas fa-key"></i></div>
          <h1>重置密码</h1>
          <p>请输入您的新密码</p>
        </div>

        <form id="resetForm">
          <div class="form-group">
            <label><i class="fas fa-lock me-1"></i>新密码</label>
            <input type="password" class="form-control" id="newPassword" placeholder="至少6位密码" required minlength="6">
          </div>
          <div class="form-group">
            <label><i class="fas fa-check me-1"></i>确认密码</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="再次输入密码" required minlength="6">
          </div>
          <div class="error-msg" id="errorMsg" style="color:#ff4d4f;font-size:13px;display:none;margin-bottom:12px;text-align:center;"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="resetBtn">
            <i class="fas fa-save me-1"></i>重置密码
          </button>
          <div class="text-center mt-3">
            <a href="/login.html" style="font-size:13px;"><i class="fas fa-arrow-left me-1"></i>返回登录</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('errorMsg').textContent = '重置链接无效，请重新申请';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('resetBtn').disabled = true;
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        document.getElementById('errorMsg').textContent = '两次密码输入不一致';
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>重置中...';

      const result = await API.post('/auth/reset-password', { token, password });
      if (result.code === 200) {
        btn.innerHTML = '<i class="fas fa-check me-1"></i>重置成功';
        document.getElementById('errorMsg').style.color = '#52c41a';
        document.getElementById('errorMsg').textContent = '密码重置成功，即将跳转到登录页...';
        document.getElementById('errorMsg').style.display = 'block';
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-1"></i>重置密码';
        document.getElementById('errorMsg').style.color = '#ff4d4f';
        document.getElementById('errorMsg').textContent = result.message || '重置失败';
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
