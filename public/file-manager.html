<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件管理 - 企业云盘</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <!-- Same sidebar as dashboard -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-cloud me-2"></i>企业云盘</h2>
        <p>Cloud Drive Management</p>
      </div>
      <nav class="sidebar-menu">
        <div class="menu-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i>工作台</div>
        <div class="menu-item active" onclick="location.href='/file-manager.html'"><i class="fas fa-folder"></i>我的文件</div>
        <div class="menu-item menu-sub" onclick="location.href='/file-manager.html?type=recent'" id="menuRecent"><i class="fas fa-clock"></i>最近文件</div>
        <div class="menu-item menu-sub" onclick="location.href='/file-manager.html?type=shared'" id="menuShared"><i class="fas fa-share-alt"></i>共享文件</div>
        <div class="menu-item" onclick="location.href='/admin/groups.html'"><i class="fas fa-users"></i>我的群组</div>
        <div class="menu-divider" style="border-top:1px solid rgba(255,255,255,.1); margin:8px 16px;"></div>
        <div class="menu-item" id="menuUsers2" onclick="location.href='/admin/users.html'" style="display:none;">
          <i class="fas fa-user-cog"></i>用户管理<span class="badge">Admin</span>
        </div>
        <div class="menu-item" onclick="showStorageModal()"><i class="fas fa-database"></i>存储统计</div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" onclick="showUserMenu()">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-detail">
            <div class="user-name" id="userName">加载中...</div>
            <div class="user-role" id="userRole">-</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h3><i class="fas fa-folder me-2"></i>我的文件</h3>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" onclick="showUploadModal()">
            <i class="fas fa-upload me-1"></i>上传
          </button>
          <button class="btn btn-success btn-sm" onclick="showNewFolderModal()">
            <i class="fas fa-folder-plus me-1"></i>新建文件夹
          </button>
          <button class="btn btn-outline btn-sm" onclick="Auth.logout()">
            <i class="fas fa-sign-out-alt me-1"></i>退出
          </button>
        </div>
      </div>

      <div class="page-body">
        <!-- Breadcrumb -->
        <div class="breadcrumb" id="breadcrumb">
          <a onclick="loadFiles(null)"><i class="fas fa-home me-1"></i>全部文件</a>
        </div>

        <!-- Toolbar -->
        <div class="file-toolbar">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索文件..." onkeyup="if(event.key==='Enter')searchFiles()">
          </div>
          <select class="form-control" id="typeFilter" style="width:auto;height:36px;" onchange="loadFiles()">
            <option value="">全部类型</option>
            <option value="image">图片</option>
            <option value="document">文档</option>
            <option value="video">视频</option>
            <option value="audio">音频</option>
            <option value="archive">压缩包</option>
            <option value="code">代码</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="loadFiles()"><i class="fas fa-sync"></i></button>
        </div>

        <!-- File Table -->
        <div class="card">
          <div class="card-body p-0">
            <table class="file-table" id="fileTable">
              <thead>
                <tr>
                  <th style="width:40px;"><input type="checkbox" id="selectAll" onchange="toggleAll()"></th>
                  <th>文件名</th>
                  <th style="width:100px;">大小</th>
                  <th style="width:80px;" onclick="toggleSort()" style="cursor:pointer;">修改日期</th>
                  <th style="width:120px;">操作</th>
                </tr>
              </thead>
              <tbody id="fileBody">
                <tr><td colspan="5" class="text-center text-muted py-5"><i class="fas fa-spinner fa-spin me-2"></i>加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display:none;"></div>
      </div>
    </main>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h4><i class="fas fa-upload me-2"></i>上传文件</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('uploadModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <h5>点击选择文件或拖拽文件到这里</h5>
          <p>支持常见文档、图片、视频等格式，单文件最大100MB</p>
        </div>
        <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(this)">
        <div id="uploadProgress" style="display:none;" class="mt-3">
          <div class="d-flex justify-content-between mb-1">
            <span id="uploadFileName" style="font-size:13px;">-</span>
            <span id="uploadPercent" style="font-size:13px;color:#666;">0%</span>
          </div>
          <div class="progress"><div class="progress-bar" id="uploadBar" style="width:0%;"></div></div>
          <p id="uploadStatus" class="text-center mt-2" style="font-size:13px;color:#666;"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- New Folder Modal -->
  <div class="modal-overlay" id="folderModal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h4><i class="fas fa-folder-plus me-2"></i>新建文件夹</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('folderModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>文件夹名称</label>
          <input type="text" class="form-control" id="folderName" placeholder="输入文件夹名称" maxlength="100">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('folderModal')">取消</button>
        <button class="btn btn-primary" onclick="createFolder()">创建</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h4><i class="fas fa-edit me-2"></i>重命名</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('renameModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>新名称</label>
          <input type="text" class="form-control" id="renameInput" placeholder="输入新名称">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('renameModal')">取消</button>
        <button class="btn btn-primary" onclick="doRename()">确认</button>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay" id="shareModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h4><i class="fas fa-share-alt me-2"></i>分享文件</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('shareModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>分享权限</label>
          <select class="form-control" id="sharePermission">
            <option value="download">允许下载</option>
            <option value="view">仅允许查看</option>
            <option value="edit">允许编辑</option>
          </select>
        </div>
        <div class="form-group">
          <label>提取密码（选填）</label>
          <input type="text" class="form-control" id="sharePassword" placeholder="留空表示无密码" maxlength="20">
        </div>
        <div class="form-group">
          <label>有效期</label>
          <select class="form-control" id="shareExpire">
            <option value="">永久有效</option>
            <option value="1">1小时</option>
            <option value="24">24小时</option>
            <option value="168">7天</option>
            <option value="720">30天</option>
          </select>
        </div>
        <div id="shareResult" style="display:none;" class="mt-3 p-3 bg-light rounded">
          <label class="fw-bold">分享链接:</label>
          <div class="input-group mt-1">
            <input type="text" class="form-control" id="shareUrl" readonly onclick="this.select()">
            <button class="btn btn-primary" onclick="copyShareUrl()">复制</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('shareModal')">取消</button>
        <button class="btn btn-primary" id="shareBtn" onclick="doShare()">生成分享</button>
      </div>
    </div>
  </div>

  <!-- Folder Analysis Modal -->
  <div class="modal-overlay" id="analysisModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h4><i class="fas fa-chart-pie me-2"></i>文件夹分析</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('analysisModal')">&times;</button>
      </div>
      <div class="modal-body" id="analysisBody">
        <div class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>分析中...</div>
      </div>
    </div>
  </div>

  <!-- Storage Modal -->
  <div class="modal-overlay" id="storageModal">
    <div class="modal">
      <div class="modal-header">
        <h4><i class="fas fa-chart-bar me-2"></i>存储统计</h4>
        <button class="btn btn-sm btn-outline" onclick="closeModal('storageModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="storageChart"></div>
        <div class="mt-3" id="typeStats"></div>
      </div>
    </div>
  </div>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fas fa-bars"></i>
  </button>

  <script src="https://cdn.bootcdn.net/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (!Auth.check()) {}

    const user = Auth.getUser();
    if (user) {
      document.getElementById('userName').textContent = user.nickname || user.username;
      document.getElementById('userAvatar').textContent = (user.nickname || user.username)[0].toUpperCase();
      document.getElementById('userRole').textContent = user.role === 'admin' ? '管理员' : '普通用户';
      if (user.role === 'admin') {
        document.getElementById('menuUsers2').style.display = 'flex';
      }
    }

    // ==================== State ====================
    let currentFolder = null;       // current folder ID
    let currentType = null;        // file type filter
    let pageMode = 'files';       // 'files', 'recent', 'shared'
    let sortField = 'updated_at';
    let sortOrder = 'desc';
    let selectedFiles = new Set();
    let renameTarget = null;
    let shareTarget = null;
    let pageInfo = { page: 1, pageSize: 50, total: 0 };

    // ==================== Init: check URL params ====================
    (function initPageMode() {
      const params = new URLSearchParams(window.location.search);
      const type = params.get('type');
      if (type === 'recent') {
        pageMode = 'recent';
        document.querySelector('.page-header h3').innerHTML = '<i class="fas fa-clock me-2"></i>最近文件';
        document.getElementById('menuRecent').classList.add('active');
      } else if (type === 'shared') {
        pageMode = 'shared';
        document.querySelector('.page-header h3').innerHTML = '<i class="fas fa-share-alt me-2"></i>共享文件';
        document.getElementById('menuShared').classList.add('active');
      }
    })();

    // ==================== Load Files ====================
    async function loadFiles(folderId) {
      if (folderId !== undefined) currentFolder = folderId;
      if (pageMode === 'files') {
        currentType = document.getElementById('typeFilter').value;
      }
      pageInfo.page = 1;

      let result;
      if (pageMode === 'recent') {
        result = await API.getRecentFiles(50);
        if (result.code === 200) {
          renderFiles(result.data.list);
          document.getElementById('breadcrumb').innerHTML =
            '<a onclick="location.href=\'/file-manager.html\'"><i class="fas fa-home me-1"></i>全部文件</a><span class="separator">/</span><span class="current">最近文件</span>';
          document.getElementById('pagination').style.display = 'none';
        } else {
          document.getElementById('fileBody').innerHTML =
            '<tr><td colspan="5" class="text-center text-muted py-4">加载失败</td></tr>';
        }
        return;
      } else if (pageMode === 'shared') {
        result = await API.get('/files/shared');
        if (result.code === 200) {
          renderSharedFiles(result.data.list);
          document.getElementById('breadcrumb').innerHTML =
            '<a onclick="location.href=\'/file-manager.html\'"><i class="fas fa-home me-1"></i>全部文件</a><span class="separator">/</span><span class="current">共享文件</a>';
          document.getElementById('pagination').style.display = 'none';
        } else {
          document.getElementById('fileBody').innerHTML =
            '<tr><td colspan="5" class="text-center text-muted py-4">加载失败</td></tr>';
        }
        return;
      }

      const params = { page: pageInfo.page, pageSize: pageInfo.pageSize, sort: sortField, order: sortOrder };
      if (currentFolder) params.folder_id = currentFolder;
      if (currentType) params.type = currentType;

      result = await API.getFiles(params);
      if (result.code !== 200) {
        document.getElementById('fileBody').innerHTML =
          '<tr><td colspan="5" class="text-center text-muted py-4">加载失败</td></tr>';
        return;
      }

      const { list, folders, pagination } = result.data;
      pageInfo = pagination;
      renderFiles(list, folders);
      renderBreadcrumb();
      renderPagination();
    }

    function renderFiles(files, folders) {
      const tbody = document.getElementById('fileBody');
      const hasFolders = folders && folders.length > 0;
      const hasFiles = files && files.length > 0;

      if (!hasFolders && !hasFiles) {
        tbody.innerHTML = `<tr>
          <td colspan="5">
            <div class="empty-state">
              <i class="fas fa-folder-open"></i>
              <h4>此文件夹为空</h4>
              <p>点击上方「上传」按钮或拖拽文件到此处</p>
            </div>
          </td>
        </tr>`;
        return;
      }

      let html = '';

      // 渲染文件夹（显示在文件前面）
      if (hasFolders) {
        folders.forEach(f => {
          const isSelected = selectedFiles.has(f.id);
          html += `<tr class="${isSelected ? 'selected' : ''}" data-id="${f.id}" data-type="folder">
            <td><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${f.id})"></td>
            <td>
              <div class="file-name-cell" onclick="loadFiles(${f.id})" style="cursor:pointer;">
                <span class="file-icon folder"><i class="fas fa-folder" style="color:#ffc107;"></i></span>
                <span class="name">${escapeHtml(f.name)}</span>
              </div>
            </td>
            <td>${f.total_size > 0 ? formatSize(f.total_size) : '-'}</td>
            <td>${formatDate(f.updated_at)}</td>
            <td>
              <div class="file-actions">
                <button class="btn-icon" title="分析" onclick="event.stopPropagation();showFolderAnalysis(${f.id})"><i class="fas fa-chart-pie"></i></button>
                <button class="btn-icon" title="下载" onclick="event.stopPropagation();API.downloadFolder(${f.id})"><i class="fas fa-download"></i></button>
                <button class="btn-icon" title="重命名" onclick="event.stopPropagation();showRenameModal(${f.id}, '${escapeHtml(f.name).replace(/'/g, "\\'")}', 'folder')"><i class="fas fa-pen"></i></button>
                <button class="btn-icon" title="删除" onclick="event.stopPropagation();deleteFolder(${f.id})" style="color:var(--danger);"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>`;
        });
      }

      // 渲染文件
      if (hasFiles) {
        html += files.map(f => {
        const ext = (f.extension || '').replace('.', '');
        const icon = getFileIcon(ext);
        let iconClass = '';
        if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) iconClass = 'image';
        else if (['mp4','avi','mov','wmv','flv','mkv'].includes(ext)) iconClass = 'video';
        else if (['mp3','wav','wma','aac','flac'].includes(ext)) iconClass = 'audio';
        else if (['zip','rar','7z','tar','gz'].includes(ext)) iconClass = 'archive';
        else if (['pdf'].includes(ext)) iconClass = 'pdf';
        else if (['js','py','html','css','json','xml','java','cpp','c','go','rs'].includes(ext)) iconClass = 'code';

        const isSelected = selectedFiles.has(f.id);
        const canEdit = f.is_editable;

        return `<tr class="${isSelected ? 'selected' : ''}" data-id="${f.id}">
          <td><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${f.id})"></td>
          <td>
            <div class="file-name-cell" onclick="openFile(${f.id}, '${ext}', '${escapeHtml(f.name).replace(/'/g, "\\'")}')">
              <span class="file-icon ${iconClass}"><i class="fas ${icon}"></i></span>
              <span class="name">${escapeHtml(f.name)}</span>
            </div>
          </td>
          <td>${formatSize(f.size)}</td>
          <td>${formatDate(f.updated_at)}</td>
          <td>
            <div class="file-actions">
              ${canEdit ? `<button class="btn-icon" title="在线编辑" onclick="event.stopPropagation();editFile(${f.id})"><i class="fas fa-edit"></i></button>` : ''}
              <button class="btn-icon" title="下载" onclick="event.stopPropagation();API.downloadFile(${f.id})"><i class="fas fa-download"></i></button>
              <button class="btn-icon" title="分享" onclick="event.stopPropagation();showShareModal(${f.id})"><i class="fas fa-share-alt"></i></button>
              <button class="btn-icon" title="重命名" onclick="event.stopPropagation();showRenameModal(${f.id}, '${escapeHtml(f.name).replace(/'/g, "\\'")}', 'file')"><i class="fas fa-pen"></i></button>
              <button class="btn-icon" title="删除" onclick="event.stopPropagation();deleteFile(${f.id})" style="color:var(--danger);"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>`;
      }).join('');
      }

      tbody.innerHTML = html;
    }

    // ==================== Render Shared Files ====================
    function renderSharedFiles(shares) {
      const tbody = document.getElementById('fileBody');
      if (!shares || shares.length === 0) {
        tbody.innerHTML = `<tr>
          <td colspan="5">
            <div class="empty-state">
              <i class="fas fa-share-alt"></i>
              <h4>暂无共享文件</h4>
              <p>在文件列表中点击分享按钮来分享文件</p>
            </div>
          </td>
        </tr>`;
        return;
      }

      tbody.innerHTML = shares.map(s => {
        const ext = (s.extension || '').replace('.', '');
        const icon = getFileIcon(ext);
        const shareUrl = window.location.origin + '/s/' + s.code;
        const expireText = s.expire_time ? formatDate(s.expire_time) : '永久有效';
        return `<tr>
          <td><input type="checkbox" disabled></td>
          <td>
            <div class="file-name-cell">
              <span class="file-icon"><i class="fas ${icon}"></i></span>
              <span class="name">${escapeHtml(s.name)}</span>
              <span class="tag tag-active" style="margin-left:8px;font-size:11px;">已分享</span>
            </div>
          </td>
          <td>${formatSize(s.size)}</td>
          <td style="font-size:12px;">
            <div>密码: ${s.password ? '是' : '无'}</div>
            <div>到期: ${expireText}</div>
            <div>下载: ${s.download_count || 0}次</div>
          </td>
          <td>
            <div class="file-actions">
              <button class="btn-icon" title="复制链接" onclick="event.stopPropagation();copyText('${shareUrl}')"><i class="fas fa-link"></i></button>
              <button class="btn-icon" title="下载" onclick="event.stopPropagation();API.downloadFile(${s.file_id})"><i class="fas fa-download"></i></button>
              <button class="btn-icon" title="取消分享" onclick="event.stopPropagation();cancelShare(${s.id}, ${s.file_id})" style="color:var(--danger);"><i class="fas fa-times"></i></button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => alert('已复制链接')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('已复制链接');
      });
    }

    async function cancelShare(shareId, fileId) {
      if (!confirm('确定要取消此文件的分享吗？')) return;
      const result = await API.cancelShare(shareId);
      if (result.code === 200) {
        loadFiles();
      } else {
        alert(result.message || '取消分享失败');
      }
    }

    // ==================== Breadcrumb ====================
    let folderPath = [];

    async function renderBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      if (!currentFolder) {
        bc.innerHTML = '<a onclick="loadFiles(null)"><i class="fas fa-home me-1"></i>全部文件</a>';
        return;
      }
      // Build path from root to current folder
      const result = await API.getFolders();
      if (result.code === 200) {
        const allFolders = result.data.list;
        const path = [];
        let cur = allFolders.find(f => f.id === currentFolder);
        while (cur) {
          path.unshift(cur);
          cur = cur.parent_id ? allFolders.find(f => f.id === cur.parent_id) : null;
        }
        folderPath = path;
        bc.innerHTML = '<a onclick="loadFiles(null)"><i class="fas fa-home me-1"></i>全部文件</a>';
        path.forEach(f => {
          bc.innerHTML += `<span class="separator">/</span><a onclick="loadFiles(${f.id})">${f.name}</a>`;
        });
      }
    }

    // ==================== Navigation ====================
    function openFile(id, ext, name) {
      const textExts = ['txt','md','json','xml','html','css','js','py','sql','csv','yml','yaml','ini','cfg','log','sh','bat','java','cpp','c','h','go','rs','rb','php'];
      if (textExts.includes(ext)) {
        window.location.href = `/online-edit.html?id=${id}`;
      } else {
        API.downloadFile(id);
      }
    }

    function editFile(id) {
      window.location.href = `/online-edit.html?id=${id}`;
    }

    // ==================== File Operations ====================
    function showUploadModal() {
      document.getElementById('uploadModal').classList.add('show');
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('fileInput').value = '';
    }

    async function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;

      document.getElementById('uploadFileName').textContent = file.name;
      document.getElementById('uploadProgress').style.display = 'block';
      document.getElementById('uploadPercent').textContent = '分析中...';
      document.getElementById('uploadStatus').textContent = '正在计算文件哈希...';

      try {
        // 计算MD5实现秒传
        const md5 = await computeFileMD5(file);
        document.getElementById('uploadStatus').textContent = '正在检查秒传...';

        // 检查秒传
        const checkResult = await API.checkHash(md5, file.size);
        if (checkResult.code === 200 && checkResult.data.exists) {
          document.getElementById('uploadPercent').textContent = '100%';
          document.getElementById('uploadBar').style.width = '100%';
          document.getElementById('uploadBar').className = 'progress-bar success';
          document.getElementById('uploadStatus').textContent = '检测到文件已存在，执行秒传...';

          const instantResult = await API.instantUpload({
            md5, size: file.size, name: file.name, folder_id: currentFolder
          });

          if (instantResult.code === 201) {
            document.getElementById('uploadStatus').textContent = '✅ 秒传成功！';
            setTimeout(() => { closeModal('uploadModal'); loadFiles(); }, 1000);
          } else {
            document.getElementById('uploadStatus').textContent = '❌ 秒传失败: ' + (instantResult.message || '错误');
          }
          return;
        }

        // 普通上传
        document.getElementById('uploadStatus').textContent = '正在上传...';
        const formData = new FormData();
        formData.append('file', file);
        if (currentFolder) formData.append('folder_id', currentFolder);

        // 模拟进度
        let progress = 0;
        const progressTimer = setInterval(() => {
          if (progress < 90) {
            progress += Math.random() * 15;
            document.getElementById('uploadPercent').textContent = Math.min(Math.round(progress), 90) + '%';
            document.getElementById('uploadBar').style.width = Math.min(progress, 90) + '%';
          }
        }, 300);

        const result = await API.uploadFile(formData);
        clearInterval(progressTimer);

        if (result.code === 201) {
          document.getElementById('uploadPercent').textContent = '100%';
          document.getElementById('uploadBar').style.width = '100%';
          document.getElementById('uploadBar').className = 'progress-bar success';
          document.getElementById('uploadStatus').textContent = '✅ 上传成功！';
          setTimeout(() => { closeModal('uploadModal'); loadFiles(); }, 1000);
        } else {
          document.getElementById('uploadStatus').textContent = '❌ 上传失败: ' + (result.message || '错误');
        }
      } catch (err) {
        document.getElementById('uploadStatus').textContent = '❌ 上传出错: ' + err.message;
      }
    }

    // 计算MD5 (使用SparkMD5，全文件读取以确保准确性)
    function computeFileMD5(file) {
      return new Promise((resolve, reject) => {
        const spark = new SparkMD5.ArrayBuffer();
        const reader = new FileReader();
        const chunkSize = 2 * 1024 * 1024; // 分块读取，每块2MB
        let currentPos = 0;

        reader.onload = function (e) {
          spark.append(e.target.result);
          currentPos += chunkSize;
          if (currentPos < file.size) {
            const nextChunk = file.slice(currentPos, Math.min(currentPos + chunkSize, file.size));
            reader.readAsArrayBuffer(nextChunk);
          } else {
            resolve(spark.end());
          }
        };
        reader.onerror = reject;
        const firstChunk = file.slice(0, Math.min(chunkSize, file.size));
        reader.readAsArrayBuffer(firstChunk);
      });
    }

    // Drag & Drop
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        document.getElementById('fileInput').files = files;
        handleFileSelect(document.getElementById('fileInput'));
      }
    });

    // ==================== New Folder ====================
    function showNewFolderModal() {
      document.getElementById('folderName').value = '';
      document.getElementById('folderModal').classList.add('show');
    }

    async function createFolder() {
      const name = document.getElementById('folderName').value.trim();
      if (!name) return alert('请输入文件夹名称');
      const result = await API.createFolder({ name, parent_id: currentFolder });
      if (result.code === 201) {
        closeModal('folderModal');
        loadFiles();
      } else {
        alert(result.message || '创建失败');
      }
    }

    // ==================== Rename ====================
    function showRenameModal(id, name, type) {
      renameTarget = { id, type };
      document.getElementById('renameInput').value = name;
      document.getElementById('renameModal').classList.add('show');
    }

    async function doRename() {
      const name = document.getElementById('renameInput').value.trim();
      if (!name || !renameTarget) return;
      const result = await API.renameFile(renameTarget.id, name, renameTarget.type);
      if (result.code === 200) {
        closeModal('renameModal');
        loadFiles();
      } else {
        alert(result.message || '重命名失败');
      }
    }

    // ==================== Share ====================
    function showShareModal(id) {
      shareTarget = id;
      document.getElementById('shareResult').style.display = 'none';
      document.getElementById('sharePassword').value = '';
      document.getElementById('sharePermission').value = 'download';
      document.getElementById('shareExpire').value = '';
      document.getElementById('shareBtn').textContent = '生成分享';
      document.getElementById('shareBtn').disabled = false;
      document.getElementById('shareModal').classList.add('show');
    }

    async function doShare() {
      if (!shareTarget) return;
      document.getElementById('shareBtn').disabled = true;
      document.getElementById('shareBtn').textContent = '生成中...';

      const expireHours = document.getElementById('shareExpire').value;
      const result = await API.shareFile(shareTarget, {
        password: document.getElementById('sharePassword').value || undefined,
        expire_hours: expireHours ? parseInt(expireHours) : undefined,
        permission: document.getElementById('sharePermission').value
      });

      if (result.code === 200) {
        document.getElementById('shareResult').style.display = 'block';
        document.getElementById('shareUrl').value = window.location.origin + '/s/' + result.data.code;
        document.getElementById('shareBtn').textContent = '已完成';
      } else {
        alert(result.message || '分享失败');
        document.getElementById('shareBtn').disabled = false;
        document.getElementById('shareBtn').textContent = '生成分享';
      }
    }

    function copyShareUrl() {
      const input = document.getElementById('shareUrl');
      input.select();
      document.execCommand('copy');
      alert('已复制分享链接');
    }

    // ==================== Delete ====================
    async function deleteFile(id) {
      if (!confirm('确定要删除此文件吗？')) return;
      const result = await API.deleteFile(id);
      if (result.code === 200) {
        selectedFiles.delete(id);
        loadFiles();
      } else {
        alert(result.message || '删除失败');
      }
    }

    async function deleteFolder(id) {
      if (!confirm('确定要删除此文件夹及其所有内容吗？')) return;
      const result = await API.deleteFolder(id);
      if (result.code === 200) {
        selectedFiles.delete(id);
        loadFiles();
      } else {
        alert(result.message || '删除失败');
      }
    }

    // ==================== Selection ====================
    function toggleSelect(id) {
      if (selectedFiles.has(id)) selectedFiles.delete(id);
      else selectedFiles.add(id);
      const tr = document.querySelector(`#fileBody tr[data-id="${id}"]`);
      if (tr) tr.classList.toggle('selected');
      const cb = tr?.querySelector('input[type="checkbox"]');
      if (cb) cb.checked = selectedFiles.has(id);
    }

    function toggleAll() {
      const checked = document.getElementById('selectAll').checked;
      // We need the current file list to toggle all
      document.querySelectorAll('#fileBody tr[data-id]').forEach(tr => {
        const id = parseInt(tr.dataset.id);
        if (checked) selectedFiles.add(id);
        else selectedFiles.delete(id);
      });
      // Toggle checkboxes
      document.querySelectorAll('#fileBody input[type="checkbox"]').forEach(cb => cb.checked = checked);
      document.querySelectorAll('#fileBody tr').forEach(tr => {
        tr.classList.toggle('selected', checked);
      });
    }

    // ==================== Search ====================
    async function searchFiles() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) return loadFiles();
      const result = await API.searchFiles(keyword);
      if (result.code === 200) {
        renderFiles(result.data.list);
        document.getElementById('breadcrumb').innerHTML =
          `<a onclick="loadFiles(null)"><i class="fas fa-home me-1"></i>全部文件</a><span class="separator">/</span><span class="current">搜索: ${keyword}</span>`;
      }
    }

    // ==================== Sort ====================
    function toggleSort() {
      if (sortOrder === 'desc') sortOrder = 'asc';
      else sortOrder = 'desc';
      loadFiles();
    }

    // ==================== Pagination ====================
    function renderPagination() {
      const el = document.getElementById('pagination');
      if (!pageInfo || pageInfo.totalPages <= 1) { el.style.display = 'none'; return; }
      el.style.display = 'flex';
      let html = `<button class="page-btn" onclick="goPage(${pageInfo.page - 1})" ${pageInfo.page <= 1 ? 'disabled' : ''}>&lt;</button>`;
      for (let i = 1; i <= pageInfo.totalPages; i++) {
        if (i === pageInfo.page || i === 1 || i === pageInfo.totalPages || Math.abs(i - pageInfo.page) <= 2) {
          html += `<button class="page-btn ${i === pageInfo.page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === pageInfo.page - 3 || i === pageInfo.page + 3) {
          html += `<button class="page-btn" disabled>...</button>`;
        }
      }
      html += `<button class="page-btn" onclick="goPage(${pageInfo.page + 1})" ${pageInfo.page >= pageInfo.totalPages ? 'disabled' : ''}>&gt;</button>`;
      el.innerHTML = html;
    }

    function goPage(p) {
      if (p < 1 || p > pageInfo.totalPages) return;
      pageInfo.page = p;
      const params = { page: pageInfo.page, pageSize: pageInfo.pageSize, sort: sortField, order: sortOrder };
      if (currentFolder) params.folder_id = currentFolder;
      if (currentType) params.type = currentType;
      API.getFiles(params).then(r => {
        if (r.code === 200) {
          renderFiles(r.data.list, r.data.folders);
          renderPagination();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }

    // ==================== Folder Analysis ====================
    async function showFolderAnalysis(folderId) {
      document.getElementById('analysisBody').innerHTML = '<div class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>分析中...</div>';
      document.getElementById('analysisModal').classList.add('show');

      const result = await API.getFolderAnalysis(folderId);
      if (result.code !== 200) {
        document.getElementById('analysisBody').innerHTML = '<div class="text-center py-4 text-danger">加载失败</div>';
        return;
      }

      const d = result.data;
      let html = `
        <div class="mb-4">
          <h5><i class="fas fa-folder me-2" style="color:#ffc107;"></i>${escapeHtml(d.folder_name)}</h5>
          <div class="d-flex gap-4 mt-2">
            <span style="font-size:14px;color:#666;"><strong>${d.total_files}</strong> 个文件</span>
            <span style="font-size:14px;color:#666;">总计 <strong>${formatSize(d.total_size)}</strong></span>
          </div>
        </div>`;

      // 子文件夹统计
      if (d.subfolder_stats && d.subfolder_stats.length > 0) {
        html += `<div class="mb-4">
          <h6 class="mb-2"><i class="fas fa-folder-open me-1"></i>子文件夹分布</h6>
          <div class="table-responsive"><table class="data-table"><thead><tr><th>文件夹</th><th>文件数</th><th>大小</th></tr></thead><tbody>`;
        d.subfolder_stats.forEach(s => {
          const pct = d.total_size > 0 ? ((s.total_size / d.total_size) * 100).toFixed(1) : 0;
          html += `<tr>
            <td><i class="fas fa-folder me-1" style="color:#ffc107;"></i>${escapeHtml(s.name)}</td>
            <td>${s.file_count}</td>
            <td>${formatSize(s.total_size)} <span style="color:#999;font-size:12px;">(${pct}%)</span></td>
          </tr>`;
        });
        html += `</tbody></table></div></div>`;
      }

      // 文件类型分布
      html += `<h6 class="mb-2"><i class="fas fa-chart-pie me-1"></i>文件类型分布</h6>`;
      if (d.type_stats && d.type_stats.length > 0) {
        html += `<div class="table-responsive"><table class="data-table"><thead><tr><th>类型</th><th>数量</th><th>大小</th><th>占比</th></tr></thead><tbody>`;
        d.type_stats.forEach(t => {
          const pct = d.total_size > 0 ? ((t.total_size / d.total_size) * 100).toFixed(1) : 0;
          html += `<tr>
            <td>.${t.extension || '未知'}</td>
            <td>${t.count}</td>
            <td>${formatSize(t.total_size)}</td>
            <td><div class="d-flex align-items-center gap-2">
              <div class="progress" style="width:80px;height:6px;"><div class="progress-bar" style="width:${pct}%;"></div></div>
              <span style="font-size:12px;color:#999;">${pct}%</span>
            </div></td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
      } else {
        html += '<p class="text-muted text-center py-3">暂无文件数据</p>';
      }

      document.getElementById('analysisBody').innerHTML = html;
    }

    // ==================== Storage Stats ====================
    function showStorageModal() {
      document.getElementById('storageModal').classList.add('show');
      API.getStorageStats().then(r => {
        if (r.code === 200) {
          const d = r.data;
          let html = '<h6 class="mb-3">文件类型分布</h6>';
          if (d.type_stats && d.type_stats.length > 0) {
            html += '<div class="table-responsive"><table class="data-table"><thead><tr><th>类型</th><th>数量</th><th>大小</th></tr></thead><tbody>';
            d.type_stats.forEach(t => {
              html += `<tr><td>.${t.extension || '未知'}</td><td>${t.count}</td><td>${formatSize(t.total_size)}</td></tr>`;
            });
            html += '</tbody></table></div>';
          } else {
            html += '<p class="text-muted text-center py-3">暂无数据</p>';
          }
          document.getElementById('typeStats').innerHTML = html;
        }
      });
    }

    // ==================== Utilities ====================
    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    function showUserMenu() {
      if (confirm('确定要退出登录吗？')) Auth.logout();
    }

    // Init
    loadFiles(null);

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target === el) el.classList.remove('show');
      });
    });
  </script>
